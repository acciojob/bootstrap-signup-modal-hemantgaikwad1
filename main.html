<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
		
	</head>
	<body>
	<button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Sign Up
</button>

		<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Create Account</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
      <div class="container-fluid">
        <form>
			<div class="mb-3">
                <label for="email-input" class="form-label">Email Address</label>
                <input id="email-input" type="email" class="form-control" placeholder='Enter email' required>
				<div class="form-text">Your information is safe with us.</div>
            </div>
			<div class="mb-3">
                <label for="password-input" class="form-label">Password</label>
                <input id="password-input" type="password" class="form-control" placeholder='Password' required>
            </div>
			<div class="mb-3">
                <label for="confirmpassword-input" class="form-label">Confirm Password</label>
                <input id="confirmpassword-input" type="password" class="form-control" placeholder='Confirm Password' required>
            </div>
		
		</form>
	  </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
<button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </div>
  </div>
</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
